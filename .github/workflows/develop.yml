name: MyApp

on:
  push:
    branches:
      - develop

jobs:
  CallReusablePipeline:
    uses: fablicio/pipeline-templates/.github/workflows/reusable-pipeline.yml@main
    with:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      image_name: "fabliciosoares/web-app"
    secrets: # <-- ESSA SEÇÃO É OBRIGATÓRIA AQUI
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
